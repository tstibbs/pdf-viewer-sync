name: CI

on: [push, pull_request]

env:
  npm_config_engine_strict: true

jobs:
  build:

    runs-on: ubuntu-24.04

    steps:

    - name: Checkout pdf-viewer-sync
      uses: actions/checkout@v4

    - name: Set up dependencies
      uses: jdx/mise-action@v4
    - name: Set up environment
      run: mkdir cdk.tmp
      working-directory: backend
    - name: Set up test environment
      run: cp dummy.env .env
      working-directory: backend

    # root
    - name: "root: pnpm ci"
      run: pnpm ci

    # backend
    - name: "backend: pnpm ci"
      run: pnpm ci
      working-directory: backend
    - name: "backend: synth"
      run: pnpm run testsynth
      working-directory: backend
    - name: "backend: test"
      run: pnpm run test
      working-directory: backend

    # frontend
    - name: "frontend: pnpm ci"
      run: pnpm ci
      working-directory: ui-additions
    - name: "frontend: download deps"
      run: pnpm run download-deps
      working-directory: ui-additions
    - name: "frontend: build"
      run: pnpm run build
      working-directory: ui-additions
